<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drawing Prompt Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Caveat', cursive;
      background: #fdf8f0;
      color: #2c2c2c;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── Screens ── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 1;
    }

    .screen.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── Typography ── */
    h1 {
      font-size: 4rem;
      font-weight: 700;
      margin-bottom: 2.5rem;
      text-align: center;
    }

    h2 {
      font-size: 2.7rem;
      font-weight: 700;
      margin-bottom: 2rem;
      text-align: center;
    }

    .prompt-text {
      font-size: 3.5rem;
      line-height: 1.5;
      max-width: 640px;
      padding: 0 1rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.25rem;
      text-align: center;
    }

    /* ── Buttons ── */
    .mode-btn {
      font-family: 'Caveat', cursive;
      font-size: 2.4rem;
      color: #b85c38;
      background: #fdf8f0;
      border: 2px solid #b85c38;
      border-radius: 12px;
      padding: 0.9rem 2.2rem;
      cursor: pointer;
      box-shadow: 3px 3px 0 #b85c38;
      transition: box-shadow 0.1s ease, transform 0.1s ease;
      width: 100%;
      max-width: 340px;
    }

    .mode-btn:hover {
      box-shadow: 1px 1px 0 #b85c38;
      transform: translate(2px, 2px);
    }

    .mode-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      box-shadow: 3px 3px 0 #b85c38;
      transform: none;
    }

    .mode-buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
    }

    .back-btn {
      font-family: 'Caveat', cursive;
      font-size: 2rem;
      background: none;
      border: none;
      cursor: pointer;
      color: #b85c38;
      padding: 0.25rem 0.5rem;
      line-height: 1;
    }

    .back-btn:hover {
      opacity: 0.6;
    }

    .copy-btn {
      position: absolute;
      top: 1.2rem;
      right: 1.2rem;
      z-index: 10;
      background: none;
      border: none;
      cursor: pointer;
      color: #b85c38;
      font-size: 1.3rem;
      line-height: 1;
      padding: 4px;
      transition: color 0.15s ease;
    }
    .copy-btn:hover { opacity: 0.7; }
    .copy-btn.copied { color: #b85c38; }

    .back-row {
      display: flex;
      align-items: center;
      gap: 6px;
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 10;
    }

    .screen-label {
      font-family: sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #b85c38;
      pointer-events: none;
    }

    .lock-hint {
      font-family: sans-serif;
      font-size: 0.72rem;
      color: #bbb;
      text-align: center;
      margin-top: 12px;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.3s;
    }

    .lock-hint.animating {
      opacity: 0;
    }

    /* History navigation widget */
    .history-nav {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: absolute;
      bottom: 6rem;
      left: 0;
      right: 0;
    }
    .history-nav.visible { display: flex; }

    .hist-arrow {
      font-family: 'Caveat', cursive;
      font-size: 1.8rem;
      color: #b85c38;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
    .hist-arrow:disabled { color: #ddd; cursor: default; }

    .hist-dots { display: flex; gap: 5px; align-items: center; }
    .hist-dot { width: 6px; height: 6px; border-radius: 50%; background: #ddd; }
    .hist-dot.filled { background: #c9b9a8; }
    .hist-dot.active { background: #b85c38; }

    /* History slide animation */
    @keyframes slideInFromLeft {
      from { transform: translateX(-50px); opacity: 0; }
      to   { transform: translateX(0);     opacity: 1; }
    }
    @keyframes slideInFromRight {
      from { transform: translateX(50px);  opacity: 0; }
      to   { transform: translateX(0);     opacity: 1; }
    }
    .slide-from-left  { animation: slideInFromLeft  0.22s ease forwards; }
    .slide-from-right { animation: slideInFromRight 0.22s ease forwards; }

    @keyframes bounceRight {
      0%, 100% { transform: translateX(0); }
      35%  { transform: translateX(14px); }
      65%  { transform: translateX(-5px); }
    }
    @keyframes bounceLeft {
      0%, 100% { transform: translateX(0); }
      35%  { transform: translateX(-14px); }
      65%  { transform: translateX(5px); }
    }
    .bounce-left  { animation: bounceLeft  0.38s ease; }
    .bounce-right { animation: bounceRight 0.38s ease; }

    .regen-btn {
      font-family: 'Caveat', cursive;
      font-size: 1.8rem;
      position: absolute;
      bottom: 2rem;
      color: #b85c38;
      background: #fdf8f0;
      border: 2px solid #b85c38;
      border-radius: 8px;
      padding: 0.5rem 1.8rem;
      cursor: pointer;
      box-shadow: 3px 3px 0 #b85c38;
      transition: box-shadow 0.1s ease, transform 0.1s ease;
    }

    .regen-btn:hover {
      box-shadow: 1px 1px 0 #b85c38;
      transform: translate(2px, 2px);
    }

    /* ── Error banner ── */
    .error-banner {
      color: #b85c38;
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .hidden {
      display: none;
    }

    /* ── Wallpaper ── */
    #wallpaper-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.22;
      transition: opacity 0.3s ease;
    }

    #wallpaper-layer.dimmed {
      opacity: 0.05;
    }

    /* ── Prompt slots (locking) ── */

    .prompt-slot {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      border-radius: 8px;
      padding: 0.25rem 0.5rem;
      border: 2px solid transparent;
      transition: background 0.1s ease, border-color 0.1s ease;
    }

    .prompt-slot.locked {
      border-color: #b85c38;
      background: rgba(184, 92, 56, 0.12);
    }

    .prompt-slot.animating {
      pointer-events: none;
      cursor: default;
    }

    .prompt-sep {
      pointer-events: none;
      line-height: 1.5;
    }

    .lock-icon {
      flex-shrink: 0;
    }

    /* ── Mobile adjustments ── */
    @media (max-width: 480px) {
      h1 { font-size: 3.2rem; }
      h2 { font-size: 2.2rem; }
      .prompt-text { font-size: 2.8rem; }
      .mode-btn { font-size: 2rem; padding: 0.8rem 1.5rem; }
    }

    /* ── Landscape on short screens ── */
    @media (orientation: landscape) and (max-height: 500px) {
      .screen {
        justify-content: flex-start;
        overflow-y: auto;
        padding: 0.8rem 2rem;
        padding-top: 3.5rem;
      }
      h1 { font-size: 2.2rem; margin-bottom: 0.8rem; }
      h2 { font-size: 1.8rem; margin-bottom: 0.8rem; }
      .prompt-text { font-size: 2rem; }
      .mode-btn { font-size: 1.5rem; padding: 0.5rem 1.2rem; }
      .mode-buttons { gap: 0.6rem; }
      .back-row { position: fixed; top: 1rem; left: 1rem; }
      .back-btn { font-size: 1.4rem; }
      .regen-btn { font-size: 1.2rem; bottom: 1rem; }
      .history-nav { bottom: 4rem; }
      /* just-draw landscape: override the portrait specificity winners with explicit landscape values */
      #screen-just-draw .regen-btn { bottom: 2.2rem; font-size: 1.2rem; }
      #screen-just-draw .history-nav { bottom: 5rem; }
      #screen-just-draw .prompt-text { max-height: calc(100vh - 10rem); }
      .just-draw-attribution { bottom: 0.4rem; font-size: 0.52rem; }
    }

/* ── Everyday Life attribution ── */
#screen-just-draw .regen-btn {
  bottom: 3.2rem; /* nudged up to make room for attribution */
}

#screen-just-draw .history-nav {
  bottom: 7.2rem;
}

#screen-just-draw .prompt-text {
  max-height: calc(100vh - 14rem); /* prevent long prompts reaching fixed footer */
  overflow: hidden;
}

.just-draw-attribution {
  position: absolute;
  bottom: 0.75rem;
  left: 0;
  right: 0;
  text-align: center;
  font-family: sans-serif;
  font-size: 0.58rem;
  color: rgba(44, 44, 44, 0.4);
  letter-spacing: 0.02em;
  pointer-events: auto;
}

.just-draw-attribution a {
  color: rgba(184, 92, 56, 0.65);
  text-decoration: underline;
}

/* ── Surreal Cauldron config screen ── */
#screen-cauldron-config {
  justify-content: flex-start;
  overflow-y: auto;
  padding: 4.5rem 1.5rem 2rem;
  align-items: stretch;
}

.cc-body {
  width: 100%;
  max-width: 420px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.cc-section-title {
  font-family: sans-serif;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #888;
  margin-bottom: 8px;
  margin-top: 4px;
}

.cc-components-title {
  font-family: sans-serif;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #b85c38;
  margin-bottom: 8px;
  margin-top: 16px;
}

/* Preset strip */
.cc-preset-strip {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 4px;
}

.cc-preset-chip {
  font-family: sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  border: 2px solid #b85c38;
  border-radius: 20px;
  padding: 4px 14px;
  background: #fdf8f0;
  color: #b85c38;
  cursor: pointer;
  transition: background 0.1s, color 0.1s;
}
.cc-preset-chip.active {
  background: #b85c38;
  color: white;
}

/* Slot row */
.cc-slot {
  background: #fff;
  border: 1.5px solid #b85c38;
  border-radius: 10px;
  padding: 8px 12px;
  margin-bottom: 7px;
}

.cc-slot-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.cc-slot-name {
  flex: 1;
  font-family: 'Caveat', cursive;
  font-size: 1.5rem;
  font-weight: 700;
  color: #2c2c2c;
}

.cc-remove {
  font-family: sans-serif;
  font-size: 0.82rem;
  color: #b85c38;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  text-decoration: underline;
}

.cc-toggle-on {
  width: 36px;
  height: 20px;
  background: #b85c38;
  border: none;
  border-radius: 10px;
  position: relative;
  cursor: pointer;
  flex-shrink: 0;
}
.cc-toggle-on::after {
  content: '';
  width: 16px;
  height: 16px;
  background: white;
  border-radius: 50%;
  position: absolute;
  right: 2px;
  top: 2px;
}

.cc-untagged-note {
  font-family: sans-serif;
  font-size: 0.82rem;
  color: #aaa;
  font-style: italic;
}

/* Pool selector */
.cc-pool-toggle {
  display: inline-flex;
  border: 1.5px solid #b85c38;
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 8px;
}

.cc-pool-btn {
  font-family: sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  padding: 3px 11px;
  background: none;
  border: none;
  color: #b85c38;
  cursor: pointer;
}
.cc-pool-btn.active {
  background: #b85c38;
  color: white;
}

/* Tags area */
.cc-tags-area {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}

.cc-any-all {
  display: inline-flex;
  border: 1.5px solid #b85c38;
  border-radius: 16px;
  overflow: hidden;
}

.cc-any-all-btn {
  font-family: sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  padding: 2px 8px;
  background: none;
  border: none;
  color: #b85c38;
  cursor: pointer;
}
.cc-any-all-btn.active {
  background: #b85c38;
  color: white;
}

.cc-tag-chip {
  font-family: sans-serif;
  font-size: 0.88rem;
  font-weight: 600;
  background: #fdf0e8;
  border: 1.5px solid #b85c38;
  color: #b85c38;
  border-radius: 16px;
  padding: 2px 8px;
  cursor: pointer;
}

.cc-tag-add {
  font-family: sans-serif;
  font-size: 0.88rem;
  background: none;
  border: 1.5px dashed #ccc;
  color: #aaa;
  border-radius: 16px;
  padding: 2px 8px;
  cursor: pointer;
}
.cc-tag-add.open {
  border-style: solid;
  border-color: #b85c38;
  color: #b85c38;
}

/* Tag picker panel */
.cc-tag-picker {
  border-top: 1.5px solid #f0e8dc;
  background: #fdf8f0;
  margin: 8px -12px -8px;
  padding: 10px 12px 8px;
  border-radius: 0 0 8px 8px;
}

.cc-tag-picker-label {
  font-family: sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #888;
  margin-bottom: 8px;
}

.cc-tag-picker-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 8px;
}

.cc-avail-tag {
  font-family: sans-serif;
  font-size: 0.88rem;
  background: #fff;
  border: 1.5px solid #d4c8ba;
  color: #666;
  border-radius: 16px;
  padding: 3px 10px;
  cursor: pointer;
}
.cc-avail-tag.selected {
  background: #fdf0e8;
  border-color: #b85c38;
  color: #b85c38;
}

.cc-tag-done {
  font-family: sans-serif;
  font-size: 0.88rem;
  color: #b85c38;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  display: block;
  text-align: right;
}

/* Add noun / add component */
.cc-add-noun {
  font-family: sans-serif;
  font-size: 1rem;
  color: #b85c38;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  padding: 0;
  margin-bottom: 6px;
  display: inline-block;
}

.cc-add-comp {
  margin-bottom: 6px;
}

.cc-add-comp-label {
  font-family: sans-serif;
  font-size: 1rem;
  color: #b85c38;
  text-decoration: underline;
  cursor: pointer;
  display: inline-block;
  margin-bottom: 7px;
}

.cc-add-comp-chips {
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
}

.cc-add-comp-chip {
  font-family: sans-serif;
  font-size: 0.95rem;
  background: #fff;
  border: 1.5px solid #d4c8ba;
  color: #666;
  border-radius: 16px;
  padding: 4px 12px;
  cursor: pointer;
}
.cc-add-comp-chip:hover {
  border-color: #b85c38;
  color: #b85c38;
}

/* Generate button */
.cc-generate-btn {
  font-family: 'Caveat', cursive;
  font-size: 1.8rem;
  font-weight: 700;
  background: #fdf8f0;
  color: #b85c38;
  border: 2px solid #b85c38;
  border-radius: 10px;
  padding: 0.5rem 1.8rem;
  cursor: pointer;
  width: 100%;
  margin-top: 14px;
  box-shadow: 3px 3px 0 #b85c38;
  transition: box-shadow 0.1s ease, transform 0.1s ease;
}
.cc-generate-btn:hover {
  box-shadow: 1px 1px 0 #b85c38;
  transform: translate(2px, 2px);
}
.cc-generate-btn:disabled {
  opacity: 0.35;
  box-shadow: none;
  cursor: not-allowed;
  transform: none;
}
/* Match count badge */
.cc-match-badge {
  font-family: sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  border: 1.5px solid #b85c38;
  color: #b85c38;
  border-radius: 8px;
  padding: 1px 7px;
  white-space: nowrap;
}
.cc-match-badge.cc-match-zero {
  background: #c0392b;
  border-color: #c0392b;
  color: white;
}
  </style>
</head>
<body>

  <!-- Wallpaper -->
  <div id="wallpaper-layer">
    <svg width="100%" height="100%" viewBox="0 0 420 900"
         preserveAspectRatio="xMidYMid slice"
         xmlns="http://www.w3.org/2000/svg">

      <!-- ══ TOP STRIP (y 0–160) ══ -->

      <!-- PENCIL top-left, steep angle -->
      <g transform="translate(38,55) rotate(-40)">
        <rect x="-4" y="-26" width="8" height="42" rx="1" stroke="#2c2c2c" stroke-width="1.4" fill="none"/>
        <polygon points="-4,16 4,16 0,26" stroke="#2c2c2c" stroke-width="1.2" fill="none"/>
        <line x1="-4" y1="9" x2="4" y2="9" stroke="#2c2c2c" stroke-width="1"/>
        <rect x="-4" y="-26" width="8" height="7" rx="1" stroke="#2c2c2c" stroke-width="1" fill="#2c2c2c" fill-opacity="0.15"/>
      </g>

      <!-- CRESCENT MOON -->
      <g transform="translate(120,45)">
        <path d="M8,-18 Q-12,-14 -12,2 Q-12,18 8,20 Q-8,18 -10,2 Q-10,-14 8,-18Z" stroke="#b85c38" stroke-width="1.4" fill="none"/>
      </g>

      <!-- GEAR large -->
      <g transform="translate(215,60)">
        <circle cx="0" cy="0" r="16" stroke="#2c2c2c" stroke-width="1.4" fill="none"/>
        <circle cx="0" cy="0" r="6" stroke="#2c2c2c" stroke-width="1.2" fill="none"/>
        <rect x="-3.5" y="-21" width="7" height="6" rx="1" stroke="#2c2c2c" stroke-width="1.1" fill="none"/>
        <rect x="-3.5" y="15" width="7" height="6" rx="1" stroke="#2c2c2c" stroke-width="1.1" fill="none"/>
        <rect x="15" y="-3.5" width="6" height="7" rx="1" stroke="#2c2c2c" stroke-width="1.1" fill="none"/>
        <rect x="-21" y="-3.5" width="6" height="7" rx="1" stroke="#2c2c2c" stroke-width="1.1" fill="none"/>
        <g transform="rotate(45)">
          <rect x="-3.5" y="-21" width="7" height="6" rx="1" stroke="#2c2c2c" stroke-width="1.1" fill="none"/>
          <rect x="-3.5" y="15" width="7" height="6" rx="1" stroke="#2c2c2c" stroke-width="1.1" fill="none"/>
          <rect x="15" y="-3.5" width="6" height="7" rx="1" stroke="#2c2c2c" stroke-width="1.1" fill="none"/>
          <rect x="-21" y="-3.5" width="6" height="7" rx="1" stroke="#2c2c2c" stroke-width="1.1" fill="none"/>
        </g>
      </g>

      <!-- POCKET WATCH top-right -->
      <g transform="translate(355,80)">
        <path d="M0,-22 Q7,-32 0,-40 Q-7,-32 0,-22" stroke="#b85c38" stroke-width="1.3" fill="none"/>
        <rect x="-4" y="-22" width="8" height="6" rx="2" stroke="#b85c38" stroke-width="1.2" fill="none"/>
        <circle cx="0" cy="0" r="21" stroke="#b85c38" stroke-width="1.5" fill="none"/>
        <circle cx="0" cy="0" r="17" stroke="#b85c38" stroke-width="0.7" fill="none"/>
        <line x1="0" y1="0" x2="0" y2="-13" stroke="#b85c38" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="0" y1="0" x2="9" y2="7" stroke="#b85c38" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="0" y1="-17" x2="0" y2="-13" stroke="#b85c38" stroke-width="1.2"/>
        <line x1="0" y1="13" x2="0" y2="17" stroke="#b85c38" stroke-width="1.2"/>
        <line x1="13" y1="0" x2="17" y2="0" stroke="#b85c38" stroke-width="1.2"/>
        <line x1="-17" y1="0" x2="-13" y2="0" stroke="#b85c38" stroke-width="1.2"/>
        <circle cx="0" cy="0" r="2.2" fill="#b85c38" opacity="0.6"/>
      </g>

      <!-- COMET -->
      <g transform="translate(165,95) rotate(-30)">
        <ellipse cx="0" cy="0" rx="7" ry="4" stroke="#b85c38" stroke-width="1.2" fill="none"/>
        <line x1="7" y1="0" x2="34" y2="0" stroke="#b85c38" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
        <line x1="9" y1="-2" x2="30" y2="-5" stroke="#b85c38" stroke-width="0.7" stroke-linecap="round" opacity="0.3"/>

  <script>
    // ── Data store ──────────────────────────────────────────────
    const store = {};
    document.getElementById('btn-just-draw').disabled = true;
    // document.getElementById('btn-surreal').disabled = true;
    // document.getElementById('btn-mutations').disabled = true;

    // ── Utilities ───────────────────────────────────────────────
    function pick(arr) {
      if (!arr || arr.length === 0) return '';
      return arr[Math.floor(Math.random() * arr.length)];
    }

    // ── Screen management ────────────────────────────────────────
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.getElementById('wallpaper-layer')
        .classList.toggle('dimmed', id === 'screen-imagine-prompt' || id === 'screen-just-draw');
      if (id !== 'screen-just-draw' && id !== 'screen-imagine-prompt' && id !== 'screen-cauldron-config') {
        currentPrompt = null;
        lockedSlots = {};
        clearHistory();
      }
    }

    // ── Prompt generators ────────────────────────────────────────
    function generateJustDraw() {
      return pick(store.justDraw);
    }

    function generateSurrealNarrative(current, locked) {
      const prev = current || {};
      const adjective  = locked.adjective   ? prev.adjective   : pick(store.adjectives);
      const noun       = locked.noun        ? prev.noun        : (Math.random() < 0.5 ? pick(store.nounsOrganic) : pick(store.nounsSynthetic));
      const verb       = locked.verb        ? prev.verb        : pick(store.verbs);
      const environment = locked.environment ? prev.environment : pick(store.environments);
      return { adjective, noun, verb, environment };
    }

    function generateMutation(type, current, locked) {
      const prev = current || {};

      // Determine the target pool for each slot
      let pool1, pool2;
      if (type === 'random') {
        // In random mode, each unlocked slot draws from a freshly random pool
        pool1 = Math.random() < 0.5 ? 'organic' : 'synthetic';
        pool2 = Math.random() < 0.5 ? 'organic' : 'synthetic';
      } else if (type === 'organic-organic') {
        pool1 = 'organic';  pool2 = 'organic';
      } else if (type === 'organic-synthetic') {
        pool1 = 'organic';  pool2 = 'synthetic';
      } else { // synthetic-synthetic
        pool1 = 'synthetic'; pool2 = 'synthetic';
      }

      const noun1Pool = locked.noun1 ? prev.noun1Pool : pool1;
      const noun2Pool = locked.noun2 ? prev.noun2Pool : pool2;
      const noun1 = locked.noun1 ? prev.noun1 : pick(noun1Pool === 'organic' ? store.nounsOrganic : store.nounsSynthetic);
      let noun2 = locked.noun2 ? prev.noun2 : pick(noun2Pool === 'organic' ? store.nounsOrganic : store.nounsSynthetic);

      // Avoid duplicate when both nouns draw from the same pool
      if (!locked.noun2 && noun1Pool === noun2Pool && noun2 === noun1) {
        const pool = noun2Pool === 'organic' ? store.nounsOrganic : store.nounsSynthetic;
        const candidates = pool.filter(w => w !== noun1);
        if (candidates.length > 0) noun2 = pick(candidates);
      }

      return { noun1, noun1Pool, noun2, noun2Pool };
    }

    // ── Prompt rendering ─────────────────────────────────────────
    const LOCK_SVG = '<svg class="lock-icon" width="16" height="18" viewBox="0 0 16 18" fill="none"><rect x="1" y="8" width="14" height="10" rx="2" stroke="#b85c38" stroke-width="2"/><path d="M4 8V6a4 4 0 0 1 8 0v2" stroke="#b85c38" stroke-width="2" stroke-linecap="round"/></svg>';

    function renderPrompt(container, mode) {
      container.innerHTML = '';

      // ── Cauldron mode: slots driven by cauldronConfig ──
      if (mode === 'cauldron') {
        const activeSlots = cauldronConfig.slots.filter(s => s.enabled);
        activeSlots.forEach((slot, i) => {
          const span = document.createElement('span');
          span.className = 'prompt-slot' + (lockedSlots[slot.id] ? ' locked' : '');
          span.dataset.slot = slot.id;
          span.innerHTML = (lockedSlots[slot.id] ? LOCK_SVG : '') + currentPrompt[slot.id];
          span.addEventListener('click', () => toggleLock(slot.id, container, mode));
          container.appendChild(span);
          if (i < activeSlots.length - 1) {
            const s = document.createElement('span');
            s.className = 'prompt-sep';
            s.textContent = ' · ';
            container.appendChild(s);
          }
        });
        return;
      }

      // ── Surreal / Mutations mode (existing) ──
      const slots = mode === 'surreal'
        ? ['adjective', 'noun', 'verb', 'environment']
        : ['noun1', 'noun2'];
      const sep = mode === 'surreal' ? ' · ' : ' + ';

      slots.forEach((slot, i) => {
        const span = document.createElement('span');
        span.className = 'prompt-slot' + (lockedSlots[slot] ? ' locked' : '');
        span.dataset.slot = slot;
        span.innerHTML = (lockedSlots[slot] ? LOCK_SVG : '') + currentPrompt[slot];
        span.addEventListener('click', () => toggleLock(slot, container, mode));
        container.appendChild(span);
        if (i < slots.length - 1) {
          const s = document.createElement('span');
          s.className = 'prompt-sep';
          s.textContent = sep;
          container.appendChild(s);
        }
      });
    }

    function animateSlot(el, pool, finalValue, durationMs) {
      if (el.classList.contains('locked')) return;
      // Guard against double-invocation: cancel any in-flight animation on this element
      const gen = (el.__animGen = (el.__animGen || 0) + 1);
      el.classList.add('animating');
      let elapsed = 0;
      let intervalTime = 55;

      function tick() {
        if (el.__animGen !== gen) return; // stale — a newer animation has taken over
        el.textContent = pick(pool);
        elapsed += intervalTime;
        if (elapsed > durationMs * 0.55) {
          intervalTime = Math.min(intervalTime * 1.22, 320);
        }
        if (elapsed >= durationMs) {
          el.textContent = finalValue;
          el.classList.remove('animating');
          el.style.transition = 'transform 0.13s cubic-bezier(0.34,1.56,0.64,1)';
          el.style.transform = 'scale(1.18)';
          setTimeout(() => {
            if (el.__animGen !== gen) return; // still guard — another anim may have started
            el.style.transform = 'scale(1)';
            setTimeout(() => {
              if (el.__animGen === gen) {
                el.style.transition = '';
                el.style.transform = '';
              }
            }, 130);
          }, 130);
          return;
        }
        setTimeout(tick, intervalTime);
      }
      tick();
    }

    function animateUnlockedSlots(container) {
      if (!currentPrompt) return;

      // ── Cauldron mode ──
      if (imagineMode === 'cauldron' && cauldronConfig) {
        container.querySelectorAll('.prompt-slot:not(.locked)').forEach(span => {
          const slotId = span.dataset.slot;
          const slotDef = cauldronConfig.slots.find(s => s.id === slotId);
          if (!slotDef) return;
          let pool;
          if (slotDef.type === 'adjective') {
            pool = store.adjectives;
          } else if (slotDef.type === 'noun') {
            const full = slotDef.pool === 'organic'   ? store.nounsOrganicFull
                       : slotDef.pool === 'synthetic' ? store.nounsSyntheticFull
                       : [...store.nounsOrganicFull, ...store.nounsSyntheticFull];
            const filtered = filterByTags(full, slotDef.tags ?? [], slotDef.tagMode);
            pool = (filtered.length ? filtered : full).map(n => n.name);
          } else if (slotDef.type === 'verb') {
            const filtered = filterByTags(store.verbsFull, slotDef.tags ?? [], slotDef.tagMode);
            pool = (filtered.length ? filtered : store.verbsFull).map(n => n.name);
          } else if (slotDef.type === 'environment') {
            const filtered = filterByTags(store.environmentsFull, slotDef.tags ?? [], slotDef.tagMode);
            pool = (filtered.length ? filtered : store.environmentsFull).map(n => n.name);
          }
          if (pool && pool.length > 0) animateSlot(span, pool, currentPrompt[slotId], 1200);
        });
        return;
      }

      // ── Existing surreal / mutations mode ──
      const pools = {
        adjective:   store.adjectives,
        noun:        Math.random() < 0.5 ? store.nounsOrganic : store.nounsSynthetic,
        verb:        store.verbs,
        environment: store.environments,
        noun1: currentPrompt.noun1Pool === 'organic' ? store.nounsOrganic : store.nounsSynthetic,
        noun2: currentPrompt.noun2Pool === 'organic' ? store.nounsOrganic : store.nounsSynthetic,
      };

      container.querySelectorAll('.prompt-slot:not(.locked)').forEach(span => {
        const slot = span.dataset.slot;
        if (!pools[slot]) { console.warn('animateUnlockedSlots: unknown slot', slot); return; }
        animateSlot(span, pools[slot], currentPrompt[slot], 1200);
      });
    }

    function animateJustDraw(el, finalValue) {
      animateSlot(el, store.justDraw, finalValue, 1200);
    }

    // ── Cauldron helpers ─────────────────────────────────────────
    function filterByTags(pool, tags, tagMode) {
      if (!tags || tags.length === 0) return pool;
      return tagMode === 'all'
        ? pool.filter(item => tags.every(t => item.tags.includes(t)))
        : pool.filter(item => tags.some(t => item.tags.includes(t)));
    }

    function getAvailableTags(slot) {
      if (slot.type === 'noun') {
        if (slot.pool === 'organic') return store.nounsOrganicTags;
        if (slot.pool === 'synthetic') return store.nounsSyntheticTags;
        return [...new Set([...store.nounsOrganicTags, ...store.nounsSyntheticTags])].sort();
      }
      if (slot.type === 'verb') return store.verbsTags;
      if (slot.type === 'environment') return store.environmentsTags;
      return [];
    }

    function initCauldronConfig(preset) {
      openTagPickerSlotId = null;
      if (preset === 'strange') {
        cauldronConfig = {
          preset: 'strange',
          slots: [
            { id: 'noun_1', type: 'noun', enabled: true, pool: 'either', tags: [], tagMode: 'any' },
            { id: 'noun_2', type: 'noun', enabled: true, pool: 'either', tags: [], tagMode: 'any' },
          ]
        };
      } else {
        cauldronConfig = {
          preset: 'surreal',
          slots: [
            { id: 'adjective',   type: 'adjective',   enabled: true },
            { id: 'noun_1',      type: 'noun',         enabled: true,  pool: 'either', tags: [], tagMode: 'any' },
            { id: 'verb',        type: 'verb',         enabled: true,  tags: [], tagMode: 'any' },
            { id: 'environment', type: 'environment',  enabled: true,  tags: [], tagMode: 'any' },
          ]
        };
      }
    }

    function generateCauldron(config, current, locked) {
      const prev = current || {};
      const result = {};
      const activeSlots = config.slots.filter(s => s.enabled);
      const usedNames = {}; // tracks used noun names per pool key to prevent duplicates

      for (const slot of activeSlots) {
        if (locked[slot.id]) {
          result[slot.id] = prev[slot.id];
          // Track locked noun names so subsequent noun slots don't pick the same word
          if (slot.type === 'noun' && prev[slot.id]) {
            const poolKey = slot.pool;
            if (!usedNames[poolKey]) usedNames[poolKey] = new Set();
            usedNames[poolKey].add(prev[slot.id]);
          }
          continue;
        }

        if (slot.type === 'adjective') {
          result[slot.id] = pick(store.adjectives);

        } else if (slot.type === 'noun') {
          const fullPool = slot.pool === 'organic'   ? store.nounsOrganicFull
                         : slot.pool === 'synthetic' ? store.nounsSyntheticFull
                         : [...store.nounsOrganicFull, ...store.nounsSyntheticFull];
          const filtered = filterByTags(fullPool, slot.tags ?? [], slot.tagMode);
          const candidates = filtered.length ? filtered : fullPool;
          // Duplicate prevention: exclude names already used from the same pool key
          const poolKey = slot.pool;
          if (!usedNames[poolKey]) usedNames[poolKey] = new Set();
          const deduped = candidates.filter(n => !usedNames[poolKey].has(n.name));
          const chosen = pick(deduped.length ? deduped : candidates);
          result[slot.id] = chosen.name;
          usedNames[poolKey].add(chosen.name);

        } else if (slot.type === 'verb') {
          const filtered = filterByTags(store.verbsFull, slot.tags ?? [], slot.tagMode);
          result[slot.id] = pick(filtered.length ? filtered : store.verbsFull).name;

        } else if (slot.type === 'environment') {
          const filtered = filterByTags(store.environmentsFull, slot.tags ?? [], slot.tagMode);
          result[slot.id] = pick(filtered.length ? filtered : store.environmentsFull).name;
        }
      }
      return result;
    }

    function buildSlotRow(slot, isStrange) {
  const div = document.createElement('div');
  div.className = 'cc-slot';

  // ── Header ──
  const header = document.createElement('div');
  header.className = 'cc-slot-header';

  const nameEl = document.createElement('span');
  nameEl.className = 'cc-slot-name';
  const nounNum = slot.id.startsWith('noun_') ? parseInt(slot.id.split('_')[1], 10) : null;
  nameEl.textContent = slot.type === 'noun'
    ? (nounNum === 1 ? 'Noun' : `Noun ${nounNum}`)
    : slot.type.charAt(0).toUpperCase() + slot.type.slice(1);
  header.appendChild(nameEl);

  // Remove link (extra nouns only — noun_2 and beyond)
  if (slot.type === 'noun' && slot.id !== 'noun_1') {
    const removeBtn = document.createElement('button');
    removeBtn.className = 'cc-remove';
    removeBtn.textContent = 'remove';
    removeBtn.addEventListener('click', () => {
      cauldronConfig.slots = cauldronConfig.slots.filter(s => s.id !== slot.id);
      if (openTagPickerSlotId === slot.id) openTagPickerSlotId = null;
      renderCauldronConfig();
    });
    header.appendChild(removeBtn);
  }

  // Match count badge (tagged slots only, when ≥1 tag selected)
  if (slot.type !== 'adjective' && slot.tags && slot.tags.length > 0) {
    let pool;
    if (slot.type === 'noun') {
      const full = slot.pool === 'organic'   ? store.nounsOrganicFull
                 : slot.pool === 'synthetic' ? store.nounsSyntheticFull
                 : [...store.nounsOrganicFull, ...store.nounsSyntheticFull];
      pool = filterByTags(full, slot.tags, slot.tagMode);
    } else if (slot.type === 'verb') {
      pool = filterByTags(store.verbsFull, slot.tags, slot.tagMode);
    } else if (slot.type === 'environment') {
      pool = filterByTags(store.environmentsFull, slot.tags, slot.tagMode);
    }
    if (pool !== undefined) {
      const count = pool.length;
      const badge = document.createElement('span');
      badge.className = 'cc-match-badge' + (count === 0 ? ' cc-match-zero' : '');
      badge.textContent = count === 0 ? '0 matches' : `${count} matches`;
      header.appendChild(badge);
    }
  }

  // Toggle-off button (surreal mode only; not on noun slots — nouns are removed, not toggled)
  if (!isStrange && slot.type !== 'noun') {
    const tog = document.createElement('button');
    tog.className = 'cc-toggle-on';
    tog.setAttribute('aria-label', `Disable ${slot.type}`);
    tog.addEventListener('click', () => {
      slot.enabled = false;
      if (openTagPickerSlotId === slot.id) openTagPickerSlotId = null;
      renderCauldronConfig();
    });
    header.appendChild(tog);
  }

  div.appendChild(header);

  // ── Adjective: untagged note ──
  if (slot.type === 'adjective') {
    const note = document.createElement('span');
    note.className = 'cc-untagged-note';
    note.textContent = 'untagged — fully random';
    div.appendChild(note);
    return div;
  }

  // ── Pool toggle (nouns only) ──
  if (slot.type === 'noun') {
    const poolDiv = document.createElement('div');
    poolDiv.className = 'cc-pool-toggle';
    ['organic', 'either', 'synthetic'].forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'cc-pool-btn' + (slot.pool === p ? ' active' : '');
      btn.textContent = p.charAt(0).toUpperCase() + p.slice(1);
      btn.addEventListener('click', () => {
        slot.pool = p;
        slot.tags = []; // clear tags when pool changes — tags may no longer be valid
        slot.tagMode = 'any';
        openTagPickerSlotId = null;
        renderCauldronConfig();
      });
      poolDiv.appendChild(btn);
    });
    div.appendChild(poolDiv);
  }

  // ── Tags area ──
  const tagsArea = document.createElement('div');
  tagsArea.className = 'cc-tags-area';

  // ANY/ALL toggle (only when ≥1 tag selected)
  if (slot.tags.length > 0) {
    const anyAll = document.createElement('div');
    anyAll.className = 'cc-any-all';
    ['any', 'all'].forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'cc-any-all-btn' + (slot.tagMode === m ? ' active' : '');
      btn.textContent = m.toUpperCase();
      btn.addEventListener('click', () => {
        slot.tagMode = m;
        renderCauldronConfig();
      });
      anyAll.appendChild(btn);
    });
    tagsArea.appendChild(anyAll);
  }

  // Selected tag chips (each tappable to remove)
  slot.tags.forEach(tag => {
    const chip = document.createElement('span');
    chip.className = 'cc-tag-chip';
    chip.textContent = tag + ' ×';
    chip.addEventListener('click', () => {
      slot.tags = slot.tags.filter(t => t !== tag);
      if (slot.tags.length === 0) slot.tagMode = 'any';
      renderCauldronConfig();
    });
    tagsArea.appendChild(chip);
  });

  // + tag button
  const addTagBtn = document.createElement('button');
  const pickerOpen = openTagPickerSlotId === slot.id;
  addTagBtn.className = 'cc-tag-add' + (pickerOpen ? ' open' : '');
  addTagBtn.textContent = pickerOpen ? '+ tag ▴' : '+ tag ▾';
  addTagBtn.addEventListener('click', () => {
    openTagPickerSlotId = pickerOpen ? null : slot.id;
    renderCauldronConfig();
  });
  tagsArea.appendChild(addTagBtn);

  div.appendChild(tagsArea);

  // ── Inline tag picker panel ──
  if (pickerOpen) {
    const picker = document.createElement('div');
    picker.className = 'cc-tag-picker';

    const label = document.createElement('div');
    label.className = 'cc-tag-picker-label';
    label.textContent = 'Available tags — alphabetical';
    picker.appendChild(label);

    const chipsDiv = document.createElement('div');
    chipsDiv.className = 'cc-tag-picker-chips';
    const available = getAvailableTags(slot);
    available.forEach(tag => {
      const chip = document.createElement('button');
      const isSelected = slot.tags.includes(tag);
      chip.className = 'cc-avail-tag' + (isSelected ? ' selected' : '');
      chip.textContent = isSelected ? tag + ' ✓' : tag;
      chip.addEventListener('click', () => {
        if (isSelected) {
          slot.tags = slot.tags.filter(t => t !== tag);
          if (slot.tags.length === 0) slot.tagMode = 'any';
        } else {
          slot.tags.push(tag);
        }
        renderCauldronConfig();
      });
      chipsDiv.appendChild(chip);
    });
    picker.appendChild(chipsDiv);

    const doneBtn = document.createElement('button');
    doneBtn.className = 'cc-tag-done';
    doneBtn.textContent = 'done';
    doneBtn.addEventListener('click', () => {
      openTagPickerSlotId = null;
      renderCauldronConfig();
    });
    picker.appendChild(doneBtn);

    div.appendChild(picker);
  }

  return div;
}

function renderCauldronConfig() {
  const isStrange = cauldronConfig.preset === 'strange';

  // Update preset chips
  document.getElementById('cc-preset-surreal').classList.toggle('active', !isStrange);
  document.getElementById('cc-preset-strange').classList.toggle('active', isStrange);

  // Render active slots
  const slotsContainer = document.getElementById('cc-slots');
  slotsContainer.innerHTML = '';

  const activeSlots = cauldronConfig.slots.filter(s => s.enabled);
  activeSlots.forEach(slot => {
    slotsContainer.appendChild(buildSlotRow(slot, isStrange));
  });

  // + add another Noun (max 4)
  const nounCount = cauldronConfig.slots.filter(s => s.type === 'noun' && s.enabled).length;
  if (nounCount < 4) {
    const addNounBtn = document.createElement('button');
    addNounBtn.className = 'cc-add-noun';
    addNounBtn.textContent = '+ add another Noun';
    addNounBtn.addEventListener('click', () => {
      const usedNums = cauldronConfig.slots.filter(s => s.id.startsWith('noun_')).map(s => parseInt(s.id.split('_')[1], 10));
      const nextNum = (usedNums.length ? Math.max(...usedNums) : 0) + 1;
      // Insert new noun after last existing noun in slots array
      const lastNounIdx = cauldronConfig.slots.reduce((acc, s, i) => s.type === 'noun' ? i : acc, -1);
      const newSlot = { id: `noun_${nextNum}`, type: 'noun', enabled: true, pool: 'either', tags: [], tagMode: 'any' };
      cauldronConfig.slots.splice(lastNounIdx + 1, 0, newSlot);
      renderCauldronConfig();
    });
    slotsContainer.appendChild(addNounBtn);
  }

  // + add component (surreal mode only — shows inactive component types)
  if (!isStrange) {
    const inactiveTypes = ['adjective', 'verb', 'environment'].filter(type =>
      !cauldronConfig.slots.find(s => s.type === type && s.enabled)
    );
    if (inactiveTypes.length > 0) {
      const addCompDiv = document.createElement('div');
      addCompDiv.className = 'cc-add-comp';

      const addCompLabel = document.createElement('span');
      addCompLabel.className = 'cc-add-comp-label';
      addCompLabel.textContent = '+ add component';
      addCompDiv.appendChild(addCompLabel);

      const chipsDiv = document.createElement('div');
      chipsDiv.className = 'cc-add-comp-chips';
      inactiveTypes.forEach(type => {
        const chip = document.createElement('button');
        chip.className = 'cc-add-comp-chip';
        chip.textContent = type.charAt(0).toUpperCase() + type.slice(1);
        chip.addEventListener('click', () => {
          // Re-enable the slot if it exists, otherwise add it
          const existing = cauldronConfig.slots.find(s => s.type === type);
          if (existing) {
            existing.enabled = true;
          } else {
            // Insert in canonical order: adjective first, then nouns, then verb, then environment
            const order = ['adjective', 'noun', 'verb', 'environment'];
            const newSlot = type === 'adjective'
              ? { id: type, type, enabled: true }
              : { id: type, type, enabled: true, tags: [], tagMode: 'any' };
            const insertBefore = cauldronConfig.slots.findIndex(s => order.indexOf(s.type) > order.indexOf(type));
            if (insertBefore === -1) cauldronConfig.slots.push(newSlot);
            else cauldronConfig.slots.splice(insertBefore, 0, newSlot);
          }
          renderCauldronConfig();
        });
        chipsDiv.appendChild(chip);
      });
      addCompDiv.appendChild(chipsDiv);
      slotsContainer.appendChild(addCompDiv);
    }
  }

  // Update generate button disabled state
  const hasZeroMatch = activeSlots.some(slot => {
    if (slot.type === 'adjective' || !slot.tags || slot.tags.length === 0) return false;
    let pool;
    if (slot.type === 'noun') {
      const full = slot.pool === 'organic'   ? store.nounsOrganicFull
                 : slot.pool === 'synthetic' ? store.nounsSyntheticFull
                 : [...store.nounsOrganicFull, ...store.nounsSyntheticFull];
      pool = filterByTags(full, slot.tags, slot.tagMode);
    } else if (slot.type === 'verb') {
      pool = filterByTags(store.verbsFull, slot.tags, slot.tagMode);
    } else if (slot.type === 'environment') {
      pool = filterByTags(store.environmentsFull, slot.tags, slot.tagMode);
    }
    return pool !== undefined && pool.length === 0;
  });
  document.getElementById('cc-generate').disabled = activeSlots.length === 0 || hasZeroMatch;
}

    function toggleLock(slot, container, mode) {
      if (lockedSlots[slot]) {
        delete lockedSlots[slot];
      } else {
        lockedSlots[slot] = true;
      }
      renderPrompt(container, mode);
    }

    // ── State ────────────────────────────────────────────────────
    // ── Cauldron state ───────────────────────────────────────────
    let cauldronConfig = null;       // { preset, slots } — set by initCauldronConfig()
    let openTagPickerSlotId = null;  // id of the slot whose inline tag picker is open
    let imagineMode = null;    // 'surreal' | 'mutations'
    let mutationType = null;   // 'organic-organic' | 'organic-synthetic' | 'synthetic-synthetic' | 'random'
    let promptBackTarget = null;
    let currentPrompt = null;  // { adjective, noun, verb, environment } | { noun1, noun1Pool, noun2, noun2Pool }
    let lockedSlots = {};      // e.g. { verb: true } — reset on back navigation

    const HISTORY_MAX = 20;
    let promptHistory = [];    // string[] for Sparks; prompt object[] for Surreal/Mutations
    let historyIndex = -1;     // -1 = empty; 0 = oldest; length-1 = newest

    // ── History helpers ──────────────────────────────────────────
    function clearHistory() {
      promptHistory = [];
      historyIndex = -1;
      document.getElementById('history-nav-imagine').classList.remove('visible');
      document.getElementById('history-nav-just-draw').classList.remove('visible');
    }

    function pushToHistory(prompt) {
      promptHistory.push(prompt);
      if (promptHistory.length > HISTORY_MAX) {
        promptHistory.shift();
      }
      historyIndex = promptHistory.length - 1;
    }

    function renderHistoryWidget(navId, dotsId, prevId, nextId) {
      const nav = document.getElementById(navId);
      const dotsContainer = document.getElementById(dotsId);
      const prevBtn = document.getElementById(prevId);
      const nextBtn = document.getElementById(nextId);

      if (promptHistory.length <= 1) {
        nav.classList.remove('visible');
        return;
      }

      nav.classList.add('visible');

      // Sliding window of up to 7 dots centred on historyIndex
      const total = promptHistory.length;
      const maxDots = Math.min(total, 7);
      const windowStart = Math.max(0, Math.min(historyIndex - 3, total - 7));

      dotsContainer.innerHTML = '';
      for (let i = windowStart; i < windowStart + maxDots; i++) {
        const dot = document.createElement('div');
        dot.className = 'hist-dot';
        if (i < historyIndex) dot.classList.add('filled');
        if (i === historyIndex) dot.classList.add('active');
        dotsContainer.appendChild(dot);
      }

      prevBtn.disabled = historyIndex === 0;
      nextBtn.disabled = historyIndex === promptHistory.length - 1;
    }

    function navigateHistory(direction, promptContainerId, mode) {
      const newIndex = historyIndex + direction;
      if (newIndex < 0 || newIndex >= promptHistory.length) {
        if (promptHistory.length > 1) {
          const el = document.getElementById(promptContainerId);
          const cls = direction === -1 ? 'bounce-right' : 'bounce-left';
          el.classList.remove('bounce-left', 'bounce-right');
          void el.offsetWidth;
          el.classList.add(cls);
          setTimeout(() => el.classList.remove(cls), 380);
        }
        return;
      }
      historyIndex = newIndex;

      const container = document.getElementById(promptContainerId);

      if (mode === 'sparks') {
        container.textContent = promptHistory[historyIndex];
      } else {
        currentPrompt = promptHistory[historyIndex];
        renderPrompt(container, mode);
      }

      // Slide animation: going back (‹) = slide from left; going forward (›) = slide from right
      container.classList.remove('slide-from-left', 'slide-from-right');
      void container.offsetWidth; // force reflow so animation re-triggers
      container.classList.add(direction === -1 ? 'slide-from-left' : 'slide-from-right');

      const suffix = promptContainerId === 'imagine-prompt' ? 'imagine' : 'just-draw';
      renderHistoryWidget(
        `history-nav-${suffix}`,
        `hist-dots-${suffix}`,
        `hist-prev-${suffix}`,
        `hist-next-${suffix}`
      );
    }

    // ── Event wiring ─────────────────────────────────────────────
    document.getElementById('btn-just-draw').addEventListener('click', () => {
      clearHistory();
      const finalValue = generateJustDraw();
      const el = document.getElementById('just-draw-prompt');
      showScreen('screen-just-draw');
      el.textContent = finalValue;
      animateJustDraw(el, finalValue);
      pushToHistory(finalValue);
      renderHistoryWidget('history-nav-just-draw', 'hist-dots-just-draw', 'hist-prev-just-draw', 'hist-next-just-draw');
    });

    document.getElementById('btn-regen-just-draw').addEventListener('click', () => {
      const finalValue = generateJustDraw();
      const el = document.getElementById('just-draw-prompt');
      el.textContent = finalValue;
      animateJustDraw(el, finalValue);
      pushToHistory(finalValue);
      renderHistoryWidget('history-nav-just-draw', 'hist-dots-just-draw', 'hist-prev-just-draw', 'hist-next-just-draw');
    });

    /**
    document.getElementById('btn-surreal').addEventListener('click', () => {
      clearHistory();
      imagineMode = 'surreal';
      promptBackTarget = 'screen-home';
      currentPrompt = generateSurrealNarrative(null, {});
      document.getElementById('imagine-screen-label').textContent = 'Surreal Narratives';
      showScreen('screen-imagine-prompt');
      const container = document.getElementById('imagine-prompt');
      renderPrompt(container, 'surreal');
      const hint = document.getElementById('lock-hint-imagine');
      hint.classList.add('animating');
      animateUnlockedSlots(container);
      setTimeout(() => hint.classList.remove('animating'), 1200);
      pushToHistory(currentPrompt);
      renderHistoryWidget('history-nav-imagine', 'hist-dots-imagine', 'hist-prev-imagine', 'hist-next-imagine');
    });

    document.getElementById('btn-mutations').addEventListener('click', () => {
      showScreen('screen-mutations-type');
    });

    **/

    document.getElementById('btn-cauldron').addEventListener('click', () => {
      clearHistory();
      lockedSlots = {};
      initCauldronConfig('surreal');
      renderCauldronConfig();
      showScreen('screen-cauldron-config');
    });

    document.getElementById('btn-cauldron-back').addEventListener('click', () => {
      cauldronConfig = null;
      openTagPickerSlotId = null;
      showScreen('screen-home');
    });

    document.getElementById('cc-preset-surreal').addEventListener('click', () => {
      initCauldronConfig('surreal');
      renderCauldronConfig();
    });

    document.getElementById('cc-preset-strange').addEventListener('click', () => {
      initCauldronConfig('strange');
      renderCauldronConfig();
    });

    document.getElementById('cc-generate').addEventListener('click', () => {
      if (!cauldronConfig) return;
      clearHistory();
      lockedSlots = {};
      imagineMode = 'cauldron';
      promptBackTarget = 'screen-cauldron-config';
      currentPrompt = generateCauldron(cauldronConfig, null, {});
      document.getElementById('imagine-screen-label').textContent = 'Surreal Cauldron';
      showScreen('screen-imagine-prompt');
      const container = document.getElementById('imagine-prompt');
      renderPrompt(container, 'cauldron');
      const hint = document.getElementById('lock-hint-imagine');
      hint.classList.add('animating');
      animateUnlockedSlots(container);
      setTimeout(() => hint.classList.remove('animating'), 1200);
      pushToHistory(currentPrompt);
      renderHistoryWidget('history-nav-imagine', 'hist-dots-imagine', 'hist-prev-imagine', 'hist-next-imagine');
    });

    ['organic-organic', 'organic-synthetic', 'synthetic-synthetic', 'random'].forEach(type => {
      document.getElementById(`btn-type-${type}`).addEventListener('click', () => {
        clearHistory();
        imagineMode = 'mutations';
        mutationType = type;  // 'random' stays 'random' — each regen re-rolls the concrete type
        promptBackTarget = 'screen-mutations-type';
        currentPrompt = generateMutation(type, null, {});
        document.getElementById('imagine-screen-label').textContent = 'Strange Combinations';
        showScreen('screen-imagine-prompt');
        const container = document.getElementById('imagine-prompt');
        renderPrompt(container, 'mutations');
        const hint = document.getElementById('lock-hint-imagine');
        hint.classList.add('animating');
        animateUnlockedSlots(container);
        setTimeout(() => hint.classList.remove('animating'), 1200);
        pushToHistory(currentPrompt);
        renderHistoryWidget('history-nav-imagine', 'hist-dots-imagine', 'hist-prev-imagine', 'hist-next-imagine');
      });
    });

    document.getElementById('btn-regen-imagine').addEventListener('click', () => {
      if (!imagineMode) return;
      const container = document.getElementById('imagine-prompt');
      if (imagineMode === 'surreal') {
        currentPrompt = generateSurrealNarrative(currentPrompt, lockedSlots);
      } else if (imagineMode === 'cauldron') {
        currentPrompt = generateCauldron(cauldronConfig, currentPrompt, lockedSlots);
      } else {
        currentPrompt = generateMutation(mutationType, currentPrompt, lockedSlots);
      }
      renderPrompt(container, imagineMode);
      const hint = document.getElementById('lock-hint-imagine');
      hint.classList.add('animating');
      animateUnlockedSlots(container);
      setTimeout(() => hint.classList.remove('animating'), 1200);
      pushToHistory(currentPrompt);
      renderHistoryWidget('history-nav-imagine', 'hist-dots-imagine', 'hist-prev-imagine', 'hist-next-imagine');
    });

    document.querySelectorAll('.back-btn[data-target]').forEach(btn => {
      btn.addEventListener('click', () => showScreen(btn.dataset.target));
    });

    function setupCopyBtn(btnId, getTextFn) {
      const btn = document.getElementById(btnId);
      btn.addEventListener('click', async () => {
        const text = getTextFn();
        if (!text) return;
        let success = false;
        try {
          await navigator.clipboard.writeText(text);
          success = true;
        } catch (e) {
          // Fallback for file:// or non-secure contexts
          try {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.cssText = 'position:fixed;top:-999px;left:-999px';
            document.body.appendChild(ta);
            ta.select();
            success = document.execCommand('copy');
            document.body.removeChild(ta);
          } catch (e2) { /* nothing we can do */ }
        }
        if (success) {
          btn.textContent = '✓';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = '⧉';
            btn.classList.remove('copied');
          }, 1500);
        }
      });
    }

    setupCopyBtn('copy-just-draw', () =>
      document.getElementById('just-draw-prompt').textContent.trim()
    );
    setupCopyBtn('copy-imagine', () =>
      document.getElementById('imagine-prompt').textContent.trim()
    );

    document.getElementById('btn-back-imagine').addEventListener('click', () => {
      showScreen(promptBackTarget ?? 'screen-home');
    });

    document.getElementById('hist-prev-imagine').addEventListener('click', () => {
      navigateHistory(-1, 'imagine-prompt', imagineMode);
    });
    document.getElementById('hist-next-imagine').addEventListener('click', () => {
      navigateHistory(1, 'imagine-prompt', imagineMode);
    });
    document.getElementById('hist-prev-just-draw').addEventListener('click', () => {
      navigateHistory(-1, 'just-draw-prompt', 'sparks');
    });
    document.getElementById('hist-next-just-draw').addEventListener('click', () => {
      navigateHistory(1, 'just-draw-prompt', 'sparks');
    });

    // ── Swipe gestures for history ────────────────────────────────
    const SWIPE_THRESHOLD = 40;

    function addSwipe(elementId, containerId, getMode) {
      let startX = null;
      const el = document.getElementById(elementId);
      el.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
      el.addEventListener('touchend', e => {
        if (startX === null) return;
        const delta = e.changedTouches[0].clientX - startX;
        startX = null;
        if (Math.abs(delta) < SWIPE_THRESHOLD) return;
        navigateHistory(delta < 0 ? 1 : -1, containerId, getMode());
      });
    }

    addSwipe('imagine-prompt', 'imagine-prompt', () => imagineMode);
    addSwipe('just-draw-prompt', 'just-draw-prompt', () => 'sparks');

    // ── Data loading ─────────────────────────────────────────────
    async function init() {
      try {
        const [justDraw, adjectives, nounsOrganicRaw, nounsSyntheticRaw, verbsRaw, environmentsRaw] =
          await Promise.all([
            fetch('data/just_draw.json').then(r => { if (!r.ok) throw new Error(); return r.json(); }),
            fetch('data/adjectives.json').then(r => { if (!r.ok) throw new Error(); return r.json(); }),
            fetch('data/nouns_organic_tagged.json').then(r => { if (!r.ok) throw new Error(); return r.json(); }),
            fetch('data/nouns_synthetic_tagged.json').then(r => { if (!r.ok) throw new Error(); return r.json(); }),
            fetch('data/verbs_tagged.json').then(r => { if (!r.ok) throw new Error(); return r.json(); }),
            fetch('data/environments_tagged.json').then(r => { if (!r.ok) throw new Error(); return r.json(); }),
          ]);

        if ([justDraw, adjectives, nounsOrganicRaw, nounsSyntheticRaw, verbsRaw, environmentsRaw]
            .some(d => !Array.isArray(d) || d.length === 0)) {
          throw new Error('Empty data');
        }

        store.justDraw            = justDraw;
        store.adjectives          = adjectives;
        // Name-only arrays — used by existing generation functions unchanged
        store.nounsOrganic        = nounsOrganicRaw.map(i => i.name);
        store.nounsSynthetic      = nounsSyntheticRaw.map(i => i.name);
        store.verbs               = verbsRaw.map(i => i.name);
        store.environments        = environmentsRaw.map(i => i.name);
        // Full tagged objects — used by cauldron for tag filtering
        store.nounsOrganicFull    = nounsOrganicRaw;
        store.nounsSyntheticFull  = nounsSyntheticRaw;
        store.verbsFull           = verbsRaw;
        store.environmentsFull    = environmentsRaw;
        // Unique sorted tags extracted per pool — used by tag picker UI
        store.nounsOrganicTags    = [...new Set(nounsOrganicRaw.flatMap(i => i.tags))].sort();
        store.nounsSyntheticTags  = [...new Set(nounsSyntheticRaw.flatMap(i => i.tags))].sort();
        store.verbsTags           = [...new Set(verbsRaw.flatMap(i => i.tags))].sort();
        store.environmentsTags    = [...new Set(environmentsRaw.flatMap(i => i.tags))].sort();
        document.getElementById('btn-just-draw').disabled = false;
        // document.getElementById('btn-surreal').disabled = false;
        // document.getElementById('btn-mutations').disabled = false;
        document.getElementById('btn-cauldron').disabled = false;
      } catch {
        document.getElementById('error-banner').classList.remove('hidden');
        document.getElementById('btn-just-draw').disabled = true;
        // document.getElementById('btn-surreal').disabled = true;
        //document.getElementById('btn-mutations').disabled = true;
        document.getElementById('btn-cauldron').disabled = true;
      }
    }

    init();
  </script>
