<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drawing Prompt Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Wallpaper -->
  <div id="wallpaper-layer"></div>

  <!-- Screen: Home -->
  <div id="screen-home" class="screen active">
    <h1>Drawing Prompt Lab</h1>
    <p id="error-banner" class="error-banner hidden">
      Couldn't load prompt data — try refreshing.
    </p>
    <div class="mode-buttons">
      <button id="btn-just-draw" class="mode-btn">Everyday Life</button>
      <button id="btn-strange-scenes" class="mode-btn" disabled>Strange Scenes</button>
      <button id="btn-cauldron" class="mode-btn">Surreal Cauldron</button>
      <button id="btn-favorites" class="mode-btn" disabled>★ Favorites</button>
    </div>
  </div>


  <!-- Screen: Surreal Cauldron Config -->
  <div id="screen-cauldron-config" class="screen">
    <div class="back-row">
      <button id="btn-cauldron-back" class="back-btn">←</button>
      <span class="screen-label">Surreal Cauldron</span>
    </div>
    <div class="cc-body">
      <div class="cc-section-title">Start from</div>
      <div class="cc-preset-strip">
        <button class="cc-preset-chip active" id="cc-preset-surreal">Surreal Narrative</button>
        <button class="cc-preset-chip" id="cc-preset-strange">Strange Combinations</button>
      </div>
      <div class="cc-components-title">Components</div>
      <div id="cc-slots"></div>
      <button class="cc-generate-btn" id="cc-generate" disabled>Generate ↓</button>
    </div>
  </div>

  <!-- Screen: Shared Prompt -->
  <div id="screen-prompt" class="screen">
    <div class="back-row">
      <button id="prompt-back-btn" class="back-btn">←</button>
      <span id="prompt-screen-label" class="screen-label"></span>
    </div>
    <div class="pm-header-right">
      <button id="prompt-filter-btn" class="pm-filter-btn">⊞ filter</button>
      <button class="copy-btn" id="prompt-copy-btn" title="Copy prompt">⧉ copy</button>
    </div>
    <div id="prompt-zone">
      <div id="prompt-content" class="prompt-text"></div>
    </div>
    <button id="prompt-star-btn" class="star-btn" aria-label="Save to favorites">☆</button>
    <p id="prompt-tag-indicator" class="pm-tag-indicator"></p>
    <p id="prompt-lock-hint" class="lock-hint hidden">tap a word to lock it</p>
    <button id="prompt-regen-btn" class="regen-btn">↺ new prompt</button>
    <div class="history-nav" id="prompt-history-nav">
      <button class="hist-arrow" id="prompt-hist-prev">‹</button>
      <div class="hist-dots" id="prompt-hist-dots"></div>
      <button class="hist-arrow" id="prompt-hist-next">›</button>
    </div>
    <!-- Filter sheet overlay -->
    <div id="prompt-filter-backdrop" class="pm-filter-backdrop"></div>
    <div id="prompt-filter-sheet" class="pm-filter-sheet hidden">
      <div id="prompt-sheet-title" class="pm-sheet-title"></div>
      <p class="pm-sheet-subtitle">All prompts shown when nothing selected</p>
      <div id="prompt-tag-chips" class="pm-tag-chips"></div>
      <div id="prompt-any-all-row" class="pm-any-all-row hidden">
        <span class="pm-any-all-label">match</span>
        <div class="pm-any-all-toggle">
          <button class="pm-aa-btn active" data-mode="any">any</button>
          <button class="pm-aa-btn" data-mode="all">all</button>
        </div>
        <span id="prompt-pool-count" class="pm-pool-count"></span>
      </div>
      <div class="pm-sheet-actions">
        <button id="prompt-clear-btn" class="pm-clear-btn">clear</button>
        <button id="prompt-apply-btn" class="pm-apply-btn">↺ new prompt</button>
      </div>
    </div>
  </div>

  <!-- Screen: Favorites -->
  <div id="screen-favorites" class="screen fav-screen">
    <div class="back-row">
      <button id="btn-favorites-back" class="back-btn">←</button>
      <span class="screen-label">Favorites</span>
    </div>
    <div class="fav-body">
      <p class="fav-warning">Favorites are saved in your browser. Clearing site data will erase them.</p>
      <div class="fav-search-row">
        <input type="search" id="fav-search" class="fav-search" placeholder="search favorites" autocomplete="off">
      </div>
      <div id="fav-list" class="fav-list"></div>
      <div class="fav-footer">
        <button id="fav-export-btn" class="fav-export-btn">⬇ Export</button>
      </div>
    </div>
  </div>

  <script src="js/favorites.js" defer></script>
  <script src="js/utils.js" defer></script>
  <script src="js/cauldron.js" defer></script>
  <script src="js/pool.js" defer></script>
  <script src="js/prompt-screen.js" defer></script>
  <script src="js/app.js" defer></script>
</body>
</html>
